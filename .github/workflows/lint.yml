name: Python Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install flake8 black
      - name: Run Black
        run: black . --check
      - name: Run Flake8
        run: flake8 . --max-line-length=88 --ignore=E501,F401,E203